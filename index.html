<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmen Martín Oliveira | Gerente Adjunto CC Holea</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b132b 0%, #1c2541 100%);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 360px;
            width: 100%;
            border-top: 5px solid #d4af37; /* Detalle en oro corporativo */
        }
        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37; /* Borde dorado */
            margin-bottom: 20px;
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.15);
        }
        h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            color: #0b132b;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #d4af37; /* Oro corporativo */
            margin-bottom: 8px;
        }
        .company {
            font-size: 15px;
            font-weight: 600;
            color: #1c2541;
            margin-bottom: 20px;
        }
        .description {
            font-size: 14px;
            color: #576574;
            line-height: 1.6;
            margin-top: 0;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            background-color: #1c2541; /* Botón azul corporativo oscuro */
            color: white;
            padding: 13px;
            margin: 12px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #0b132b;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(11, 19, 43, 0.2);
        }
        .btn-highlight {
            background-color: #d4af37; /* Botón dorado destacado */
            color: #0b132b;
            font-weight: 700;
        }
        .btn-highlight:hover {
            background-color: #c5a028;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Cargamos la foto de perfil que subas a este repositorio -->
        <img src="perfil.jpeg" alt="Carmen Martín Oliveira" class="profile-img">
        
        <h1>Carmen Martín Oliveira</h1>
        <div class="subtitle">Gerente Adjunto</div>
        <div class="company">Centro Comercial Holea | Huelva</div>
        
        <p class="description">Apasionada del entorno corporativo y el desarrollo empresarial. Especializada en la gestión estratégica, operativa y comercial de grandes superficies retail.</p>
        
        <!-- Líneas 99 y 100 de contacto directo -->
        <a href="https://linkedin.com/in/carmenmartinoliveira" target="_blank" class="btn">Conectar en LinkedIn</a>
        <a href="mailto:carmen.mo26@gmail.com" class="btn btn-highlight">Escríbeme por Email</a>
    </div>

</body>
</html>
